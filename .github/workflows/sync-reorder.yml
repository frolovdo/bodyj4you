name: Reorder pipeline (Drive → skill → Drive)

# Watches the IN folder. When a newer FBA file appears than the newest Miami
# output, runs the skill and uploads the 2 reorder files to the OUT folders.
# No-op otherwise.

on:
  workflow_dispatch: {}        # manual trigger
  schedule:
    - cron: '*/30 * * * *'     # every 30 min

permissions:
  contents: read

concurrency:
  group: reorder-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Install Python deps
        working-directory: automation
        run: pip install --no-cache-dir -r requirements.txt

      - name: Install Node deps
        working-directory: automation
        run: npm install --no-audit --no-fund

      - name: Run pipeline
        working-directory: automation
        env:
          GDRIVE_SA_KEY: ${{ secrets.GDRIVE_SA_KEY }}
          IN_FOLDER:  '19-AoS9nM3nm702v9tw15LWQGAT2c4xQr'
          OUT_MIAMI:  '1LgVtREkBxLcrrFdhkc4TTplzZhH0gu1U'
          OUT_CHINA:  '1MBGCoI4yTltZdRlnOHcpl9pg5ZaubluF'
        run: node sync-from-drive.mjs
