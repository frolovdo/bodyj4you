name: Sync Supply Chain Dashboard

on:
  schedule:
    # Hourly on Mondays, 9am - 9pm America/New_York (covers EDT and EST).
    # GitHub cron is UTC, so we span the window in two ranges:
    #   13:00 - 23:00 UTC Mon  = 9am - 7pm EDT  /  8am - 6pm EST
    #   00:00 - 02:00 UTC Tue  = 8pm - 10pm EDT /  7pm - 9pm EST
    # Together this covers 9am-9pm both in EDT and EST (one extra hour on
    # each edge for EST; harmless because no-op runs cost nothing).
    - cron: '0 13-23 * * 1'
    - cron: '0 0-2 * * 2'
  workflow_dispatch: {}    # manual run from the Actions tab
  push:
    branches: [main]
    paths:
      - 'supply-chain-dashboard/scripts/sync-from-drive.mjs'
      - '.github/workflows/sync-supply-chain.yml'

concurrency:
  group: sync-supply-chain
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supply-chain-dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: supply-chain-dashboard/package-lock.json

      - run: npm ci

      - name: Sync from Drive
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.SUPPLY_CHAIN_GDRIVE_FOLDER_ID }}
          GDRIVE_SA_KEY: ${{ secrets.GDRIVE_SA_KEY }}
        run: npm run sync:ci

      - name: Commit + push if changed
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add supply-chain-dashboard/public/data
          if git diff --staged --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "Sync Supply Chain Dashboard snapshots"
          # Race-resistant push: pull --rebase first in case main advanced
          # between checkout and now (e.g. a PR merge landed). Retry on conflict.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main && git push && exit 0
            echo "::warning::Push attempt $attempt failed, retrying after rebase..."
            git rebase --abort 2>/dev/null || true
            sleep 5
          done
          echo "::error::Failed to push after 5 attempts."
          exit 1
