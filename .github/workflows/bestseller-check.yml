name: Amazon Best Seller Badge — Daily Check

on:
  workflow_dispatch: {}          # manual trigger for testing
  schedule:
    - cron: '0 13 * * *'        # 9 AM ET (13:00 UTC) every day

permissions:
  contents: write                # needed to commit updated history

concurrency:
  group: bestseller-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Install Python deps
        working-directory: automation
        run: pip install --no-cache-dir -r requirements.txt

      - name: Run best-seller check
        working-directory: automation
        env:
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:     ${{ secrets.BESTSELLER_RECIPIENT_EMAIL }}
        run: python bestseller_check.py

      - name: Commit updated history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bestseller_history.json
          git diff --cached --quiet || git commit -m "chore: bestseller history $(date -u +%Y-%m-%d)"
          git push
