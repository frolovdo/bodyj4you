name: Amazon Best Seller Badge Check

on:
  schedule:
    # Runs daily at 9:07 AM UTC
    - cron: '7 9 * * *'
  workflow_dispatch: # allow manual runs

permissions:
  contents: write # needed to commit updated history file

jobs:
  check-badges:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: automation/package-lock.json

      - name: Install dependencies
        working-directory: automation
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: automation
        run: npx playwright install chromium --with-deps

      - name: Run badge checker
        working-directory: automation
        env:
          GMAIL_SMTP_USER: ${{ secrets.GMAIL_SMTP_USER }}
          GMAIL_SMTP_PASS: ${{ secrets.GMAIL_SMTP_PASS }}
          # Override browser path so the script uses Playwright's installed Chromium
          PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: ''
        run: node amazon-tracker.mjs

      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add automation/amazon-badge-history.json
          git diff --staged --quiet || git commit -m "chore: update Amazon badge history $(date -u +%Y-%m-%d)"
          git push
