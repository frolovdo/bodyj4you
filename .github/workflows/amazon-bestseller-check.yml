name: Amazon Best Seller Badge Check

on:
  schedule:
    # 9:00 AM UTC daily (adjust to your timezone if needed)
    - cron: '0 9 * * *'
  workflow_dispatch: {}   # manual run from the Actions tab

concurrency:
  group: amazon-bestseller-check
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run Best Seller checker
        env:
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: denis@bodyj4you.com
        run: python automation/amazon_bestseller_checker.py

      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/amazon_bestseller_history.json
          if git diff --staged --quiet; then
            echo "No history changes to commit."
            exit 0
          fi
          git commit -m "Amazon best seller check — $(date -u '+%Y-%m-%d')"
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main && git push && exit 0
            echo "Push attempt $attempt failed, retrying..."
            git rebase --abort 2>/dev/null || true
            sleep 5
          done
          echo "Failed to push after 5 attempts."
          exit 1
