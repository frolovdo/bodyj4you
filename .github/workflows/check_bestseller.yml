name: Amazon Best Seller Daily Check

on:
  schedule:
    # 9:00 AM UTC every day (runs from the default branch)
    - cron: '0 9 * * *'
  workflow_dispatch:
    # Allow manual runs from any branch for testing

jobs:
  check-bestseller:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit updated history JSON

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Run Best Seller check
        run: python scripts/check_bestseller.py
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: denis@bodyj4you.com

      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add amazon_bestseller_history.json
          git diff --staged --quiet || \
            git commit -m "chore: Amazon Best Seller check $(date -u +%Y-%m-%d)" && \
            git push
