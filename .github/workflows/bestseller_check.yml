name: Amazon Best Seller Check

on:
  schedule:
    - cron: '0 14 * * *'   # 14:00 UTC = 10 AM EDT / 7 AM PDT daily
  workflow_dispatch: {}      # allow manual trigger from GitHub UI

permissions:
  contents: write            # needed to commit the updated history file

concurrency:
  group: bestseller-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --no-cache-dir requests beautifulsoup4 lxml

      - name: Run Best Seller check
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python automation/check_bestseller.py

      - name: Commit updated history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bestseller_history.json
          git diff --staged --quiet || git commit -m "chore: bestseller history $(date +%Y-%m-%d)"
          git push
