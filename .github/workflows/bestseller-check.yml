name: Amazon Best Seller Badge Check

on:
  schedule:
    # 9:17am UTC daily (~2:17am PT / 5:17am ET) — off the :00/:30 spike
    - cron: '17 9 * * *'
  workflow_dispatch: {}   # manual trigger from Actions tab

concurrency:
  group: bestseller-check
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Check Best Seller badges
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python automation/check_bestseller.py

      - name: Commit history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add automation/bestseller_history.json
          if git diff --staged --quiet; then
            echo "No history changes."
            exit 0
          fi
          git commit -m "chore: bestseller history $(date -u +%Y-%m-%d)"
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main && git push && exit 0
            echo "::warning::Push attempt $attempt failed, retrying..."
            git rebase --abort 2>/dev/null || true
            sleep 5
          done
          echo "::error::Failed to push after 5 attempts."
          exit 1
