name: Sync reorder snapshots from Drive

# Pulls the newest Reorder_Miami / Reorder_China sheets from the Drive output folder
# into each dashboard's public/data/, commits any change, and pushes — which triggers
# Netlify to redeploy. Idempotent: a run with no newer Drive file produces no commit.

on:
  workflow_dispatch: {}        # lets you run it on-demand from the Actions tab
  schedule:
    - cron: '0 */6 * * *'      # every 6 hours (UTC). Tighten/loosen as you like.

permissions:
  contents: write              # allows the built-in GITHUB_TOKEN to push

concurrency:
  group: sync-reorder
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install sync dependencies
        working-directory: automation
        run: npm install --no-audit --no-fund

      - name: Sync snapshots from Drive
        working-directory: automation
        env:
          GDRIVE_SA_KEY: ${{ secrets.GDRIVE_SA_KEY }}
          DRIVE_OUTPUT_FOLDER_ID: '1LgVtREkBxLcrrFdhkc4TTplzZhH0gu1U'
        run: node sync-from-drive.mjs

      - name: Commit & push if snapshots changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add miami-dashboard/public/data china-dashboard/public/data
          if git diff --cached --quiet; then
            echo "No snapshot changes — nothing to deploy."
          else
            git commit -m "chore: sync reorder snapshots from Drive"
            git push
          fi
