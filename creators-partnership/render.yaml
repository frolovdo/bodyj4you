# Render one-click deploy for the creators partnership backend.
# Create a new "Blueprint" on https://render.com pointing at this repo,
# or push and let Render auto-detect this file.
services:
  - type: web
    name: creators-partnership-backend
    runtime: node
    rootDir: creators-partnership/backend
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /apps/creators/health
    envVars:
      - key: SHOPIFY_SHOP
        sync: false        # set in dashboard: e.g. bodyj4you.myshopify.com
      - key: SHOPIFY_ADMIN_TOKEN
        sync: false        # set in dashboard: shpat_...
      - key: SHOPIFY_API_SECRET
        sync: false        # set in dashboard: app API secret (proxy HMAC)
      - key: SHOPIFY_API_VERSION
        value: "2025-01"
      - key: MAX_ITEMS
        value: "5"
